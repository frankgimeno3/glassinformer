# Amplify Console env vars exist only during build. Next.js SSR Lambdas need them in
# .env.production before `next build`. See AWS SSR env vars guide.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - |
          if [ -z "$DATABASE_HOST" ]; then
            echo "ERROR: DATABASE_HOST is not set in Amplify Environment variables."
            exit 1
          fi
        - rm -f .env.production
        - |
          cat >> .env.production <<EOF
          DATABASE_HOST=$DATABASE_HOST
          DATABASE_NAME=$DATABASE_NAME
          DATABASE_USER=$DATABASE_USER
          DATABASE_PASSWORD=$DATABASE_PASSWORD
          DATABASE_PORT=$DATABASE_PORT
          IAM_ACCESS_KEY_ID=$IAM_ACCESS_KEY_ID
          IAM_SECRET_ACCESS_KEY=$IAM_SECRET_ACCESS_KEY
          EOF
        - env | grep -E '^NEXT_PUBLIC_' >> .env.production || true
        - echo "Wrote .env.production ($(wc -l < .env.production) lines, DATABASE_HOST=$DATABASE_HOST)"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
